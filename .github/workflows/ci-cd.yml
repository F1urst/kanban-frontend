name: CI/CD Frontend

on:
  push:
    branches: [ main, master ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and tag
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/kanban-frontend:latest .
          docker tag ${{ secrets.DOCKER_USERNAME }}/kanban-frontend:latest ${{ secrets.DOCKER_USERNAME }}/kanban-frontend:${{ github.sha }}

      - name: Push to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/kanban-frontend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/kanban-frontend:${{ github.sha }}
